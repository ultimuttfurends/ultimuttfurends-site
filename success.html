<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UltiMutt Furends | Pet Care</title>
  <link rel="icon" href="./assets/favicon.ico?v=24" sizes="any" />
  <link rel="icon" type="image/png" href="./assets/favicon.png?v=24" />
  <link rel="apple-touch-icon" href="./assets/favicon.png?v=24" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Quicksand:wght@300;400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=24" />
  <style>
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px;
      text-align:center;
      background:var(--cream);
    }
    .success-card{
      width:min(780px,92vw);
      background:var(--white);
      border:1px solid var(--line);
      border-radius:34px;
      padding:clamp(34px,6vw,58px);
      box-shadow:var(--shadow);
    }
    .success-card img{
      width:150px;
      margin:0 auto 22px;
      background:transparent;
    }
    .success-card h1{
      font-family:'DM Serif Display',serif;
      font-size:clamp(3.25rem,7vw,5.8rem);
      line-height:.95;
      margin:0 0 18px;
      color:var(--brown);
    }
    .success-card p{
      max-width:580px;
      margin:0 auto;
      color:#5a5050;
      font-size:1.05rem;
    }
    .success-card .btn{
      margin-top:28px;
    }
  </style>
</head>
<body>
  <main class="success-card">
    <img src="./assets/logo.png" alt="UltiMutt Furends logo">
    <p class="eyebrow">Request Received</p>
    <h1>Thank you, Furend!</h1>
    <p>Your booking request has been received. I’ll be in touch soon to discuss your pup’s needs, answer any questions, and confirm availability.</p>
    <a class="btn primary" href="/">Back to Home</a>
  </main>
</body>
</html>
